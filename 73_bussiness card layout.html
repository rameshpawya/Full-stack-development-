<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Card Design</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    flex-wrap:wrap;
    background:#f4f6f9;
    padding:30px;
}

/* Business Card */
.card{
    width:380px;
    height:220px;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* Front Side */
.front{
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    color:white;
    padding:25px;
}

.logo{
    width:60px;
    height:60px;
    border-radius:50%;
    background:white;
    color:#4f46e5;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:bold;
}

.name{
    margin-top:25px;
    font-size:28px;
    font-weight:bold;
}

.role{
    margin-top:5px;
    font-size:16px;
    opacity:0.9;
}

.website{
    position:absolute;
    bottom:25px;
    left:25px;
    font-size:14px;
}

/* Back Side */
.back{
    background:white;
    padding:25px;
}

.back h2{
    color:#4f46e5;
    margin-bottom:15px;
}

.info{
    margin-bottom:12px;
    color:#555;
    font-size:15px;
}

.qr{
    width:80px;
    height:80px;
    background:#e5e7eb;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:10px;
    margin-top:15px;
    font-size:12px;
    color:#666;
}

.line{
    width:100%;
    height:4px;
    background:linear-gradient(90deg,#4f46e5,#06b6d4);
    border-radius:10px;
    margin-bottom:20px;
}
</style>
</head>
<body>

<!-- Front Side -->
<div class="card front">

    <div class="logo">N</div>

    <div class="name">Nila Raja</div>

    <div class="role">
        AI & Data Science Student
    </div>

    <div class="website">
        www.yourwebsite.com
    </div>

</div>

<!-- Back Side -->
<div class="card back">

    <div class="line"></div>

    <h2>Contact Details</h2>

    <div class="info">
        📧 nila@example.com
    </div>

    <div class="info">
        📱 +91 98765 43210
    </div>

    <div class="info">
        🌐 www.yourwebsite.com
    </div>

    <div class="info">
        📍 Tamil Nadu, India
    </div>

    <div class="qr">
        QR Code
    </div>

</div>

</body>
</html>
