<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Page</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f1f5f9;
      padding:30px;
    }

    .checkout-container{
      max-width:1100px;
      margin:auto;
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:30px;
    }

    /* Form Section */

    .checkout-form,
    .order-summary{
      background:white;
      padding:25px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    h2{
      margin-bottom:20px;
      color:#1e293b;
    }

    .form-group{
      margin-bottom:18px;
    }

    .form-group label{
      display:block;
      margin-bottom:8px;
      font-weight:bold;
      color:#374151;
    }

    .form-group input,
    .form-group textarea,
    .form-group select{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
      font-size:15px;
    }

    .form-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    textarea{
      resize:none;
      height:100px;
    }

    /* Order Summary */

    .summary-item{
      display:flex;
      justify-content:space-between;
      margin-bottom:15px;
      padding-bottom:10px;
      border-bottom:1px solid #ddd;
    }

    .total{
      display:flex;
      justify-content:space-between;
      font-size:22px;
      font-weight:bold;
      color:#16a34a;
      margin-top:20px;
    }

    /* Button */

    .checkout-btn{
      width:100%;
      margin-top:25px;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#1e293b;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .checkout-btn:hover{
      background:#334155;
    }

    /* Responsive */

    @media(max-width:768px){

      .checkout-container{
        grid-template-columns:1fr;
      }

      .form-row{
        grid-template-columns:1fr;
      }

      body{
        padding:20px;
      }

    }

  </style>
</head>

<body>

  <div class="checkout-container">

    <!-- Checkout Form -->

    <div class="checkout-form">

      <h2>Billing Details</h2>

      <form>

        <div class="form-row">

          <div class="form-group">
            <label>First Name</label>
            <input type="text" placeholder="Enter first name">
          </div>

          <div class="form-group">
            <label>Last Name</label>
            <input type="text" placeholder="Enter last name">
          </div>

        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="Enter email">
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" placeholder="Enter phone number">
        </div>

        <div class="form-group">
          <label>Address</label>
          <textarea placeholder="Enter your address"></textarea>
        </div>

        <div class="form-row">

          <div class="form-group">
            <label>City</label>
            <input type="text" placeholder="Enter city">
          </div>

          <div class="form-group">
            <label>Pincode</label>
            <input type="text" placeholder="Enter pincode">
          </div>

        </div>

        <div class="form-group">
          <label>Payment Method</label>

          <select>
            <option>Cash on Delivery</option>
            <option>UPI</option>
            <option>Credit Card</option>
            <option>Debit Card</option>
          </select>
        </div>

        <button class="checkout-btn">
          Place Order
        </button>

      </form>

    </div>

    <!-- Order Summary -->

    <div class="order-summary">

      <h2>Order Summary</h2>

      <div class="summary-item">
        <span>Running Shoes</span>
        <span>$49</span>
      </div>

      <div class="summary-item">
        <span>Smart Watch</span>
        <span>$99</span>
      </div>

      <div class="summary-item">
        <span>Headphones</span>
        <span>$120</span>
      </div>

      <div class="total">
        <span>Total</span>
        <span>$268</span>
      </div>

    </div>

  </div>

</body>
</html>
