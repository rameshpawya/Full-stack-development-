<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart Functionality</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f1f5f9;
      padding:30px;
    }

    h1{
      text-align:center;
      margin-bottom:40px;
      color:#1e293b;
    }

    /* Product Grid */

    .product-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
    }

    .product-card{
      background:white;
      padding:20px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      text-align:center;
    }

    .product-card img{
      width:100%;
      height:220px;
      object-fit:cover;
      border-radius:10px;
      margin-bottom:15px;
    }

    .product-card h3{
      margin-bottom:10px;
      color:#1e293b;
    }

    .price{
      font-size:22px;
      color:#16a34a;
      margin-bottom:15px;
      font-weight:bold;
    }

    .btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#1e293b;
      color:white;
      cursor:pointer;
      font-size:15px;
      transition:0.3s;
    }

    .btn:hover{
      background:#334155;
    }

    /* Cart */

    .cart{
      margin-top:50px;
      background:white;
      padding:25px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .cart h2{
      margin-bottom:20px;
      color:#1e293b;
    }

    .cart-items{
      margin-bottom:20px;
    }

    .cart-item{
      display:flex;
      justify-content:space-between;
      padding:12px 0;
      border-bottom:1px solid #ddd;
    }

    .total{
      font-size:22px;
      font-weight:bold;
      color:#16a34a;
    }

    /* Responsive */

    @media(max-width:768px){

      body{
        padding:20px;
      }

      .cart-item{
        flex-direction:column;
        gap:8px;
      }

    }

  </style>
</head>

<body>

  <h1>Shopping Cart Functionality</h1>

  <!-- Products -->

  <div class="product-grid">

    <!-- Product 1 -->

    <div class="product-card">

      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600" alt="Shoes">

      <h3>Running Shoes</h3>

      <div class="price">$49</div>

      <button class="btn"
        onclick="addToCart('Running Shoes',49)">
        Add to Cart
      </button>

    </div>

    <!-- Product 2 -->

    <div class="product-card">

      <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600" alt="Watch">

      <h3>Smart Watch</h3>

      <div class="price">$99</div>

      <button class="btn"
        onclick="addToCart('Smart Watch',99)">
        Add to Cart
      </button>

    </div>

    <!-- Product 3 -->

    <div class="product-card">

      <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600" alt="Headphones">

      <h3>Headphones</h3>

      <div class="price">$120</div>

      <button class="btn"
        onclick="addToCart('Headphones',120)">
        Add to Cart
      </button>

    </div>

  </div>

  <!-- Cart -->

  <div class="cart">

    <h2>Your Cart</h2>

    <div class="cart-items" id="cartItems">
      <p>No items added.</p>
    </div>

    <div class="total">
      Total: $<span id="totalPrice">0</span>
    </div>

  </div>

  <script>

    let total = 0;

    const cartItems = document.getElementById("cartItems");
    const totalPrice = document.getElementById("totalPrice");

    function addToCart(product, price){

      total += price;

      const item = document.createElement("div");

      item.classList.add("cart-item");

      item.innerHTML = `
        <span>${product}</span>
        <span>$${price}</span>
      `;

      if(cartItems.innerHTML.includes("No items")){
        cartItems.innerHTML = "";
      }

      cartItems.appendChild(item);

      totalPrice.innerText = total;

    }

  </script>

</body>
</html>
