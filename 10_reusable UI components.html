<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reusable UI Components</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f1f5f9;
      padding:40px;
    }

    h1{
      text-align:center;
      margin-bottom:40px;
      color:#1e293b;
    }

    .container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
    }

    /* Card Component */

    .card{
      background:white;
      padding:25px;
      border-radius:15px;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    .card h2{
      margin-bottom:10px;
      color:#1e293b;
    }

    .card p{
      color:#555;
      margin-bottom:20px;
    }

    /* Button Component */

    .btn{
      padding:12px 18px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:15px;
      transition:0.3s;
    }

    .primary-btn{
      background:#1e293b;
      color:white;
    }

    .primary-btn:hover{
      background:#334155;
    }

    .success-btn{
      background:#16a34a;
      color:white;
    }

    .success-btn:hover{
      background:#15803d;
    }

    .danger-btn{
      background:#dc2626;
      color:white;
    }

    .danger-btn:hover{
      background:#b91c1c;
    }

    /* Input Component */

    .input-group{
      margin-top:20px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      font-weight:bold;
      color:#333;
    }

    .input-group input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
      font-size:15px;
    }

    /* Badge Component */

    .badge{
      display:inline-block;
      padding:6px 12px;
      border-radius:20px;
      font-size:13px;
      font-weight:bold;
      margin-top:15px;
    }

    .badge-success{
      background:#dcfce7;
      color:#166534;
    }

    .badge-warning{
      background:#fef9c3;
      color:#854d0e;
    }

    .badge-danger{
      background:#fee2e2;
      color:#991b1b;
    }

    /* Responsive */

    @media(max-width:768px){

      body{
        padding:20px;
      }

    }

  </style>
</head>

<body>

  <h1>Reusable UI Components</h1>

  <div class="container">

    <!-- Card 1 -->

    <div class="card">

      <h2>Buttons</h2>

      <p>Reusable button components for projects.</p>

      <button class="btn primary-btn">
        Primary
      </button>

      <button class="btn success-btn">
        Success
      </button>

      <button class="btn danger-btn">
        Danger
      </button>

    </div>

    <!-- Card 2 -->

    <div class="card">

      <h2>Input Field</h2>

      <p>Reusable input component.</p>

      <div class="input-group">

        <label>Email</label>

        <input type="email" placeholder="Enter your email">

      </div>

    </div>

    <!-- Card 3 -->

    <div class="card">

      <h2>Status Badges</h2>

      <p>Reusable badge components.</p>

      <span class="badge badge-success">
        Active
      </span>

      <span class="badge badge-warning">
        Pending
      </span>

      <span class="badge badge-danger">
        Cancelled
      </span>

    </div>

  </div>

</body>
</html>
