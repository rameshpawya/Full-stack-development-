<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>JWT Authentication UI</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f3f4f6;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      width:400px;
      background:white;
      padding:30px;
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      color:#111827;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#2563eb;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#1d4ed8;
    }

    .dashboard{
      display:none;
      text-align:center;
    }

    .token-box{
      margin-top:20px;
      background:#f9fafb;
      padding:15px;
      border-radius:8px;
      word-wrap:break-word;
      border:1px solid #ddd;
      font-size:14px;
    }

    .logout-btn{
      margin-top:20px;
      background:red;
    }

    .logout-btn:hover{
      background:darkred;
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- Login Form -->

    <div id="loginSection">

      <h1>JWT Login</h1>

      <input
        type="text"
        id="username"
        placeholder="Enter Username"
      >

      <input
        type="password"
        id="password"
        placeholder="Enter Password"
      >

      <button onclick="login()">
        Login
      </button>

    </div>

    <!-- Dashboard -->

    <div class="dashboard" id="dashboard">

      <h1>Dashboard</h1>

      <p>
        JWT Authentication Successful
      </p>

      <div class="token-box" id="tokenBox">

      </div>

      <button
        class="logout-btn"
        onclick="logout()">

        Logout

      </button>

    </div>

  </div>

  <script>

    function generateFakeJWT(username){

      const header = btoa(
        JSON.stringify({
          alg:"HS256",
          typ:"JWT"
        })
      );

      const payload = btoa(
        JSON.stringify({
          user:username,
          role:"admin",
          exp:"2026"
        })
      );

      const signature =
        "jwt_signature_example";

      return ${header}.${payload}.${signature};

    }

    function login(){

      const username =
        document.getElementById("username").value;

      const password =
        document.getElementById("password").value;

      if(username === "" || password === ""){

        alert("Please enter username and password");

        return;

      }

      // Fake Authentication

      if(username === "admin"
        && password === "1234"){

        const token =
          generateFakeJWT(username);

        localStorage.setItem(
          "jwtToken",
          token
        );

        showDashboard();

      } else {

        alert("Invalid Credentials");

      }

    }

    function showDashboard(){

      const token =
        localStorage.getItem("jwtToken");

      if(token){

        document.getElementById(
          "loginSection"
        ).style.display = "none";

        document.getElementById(
          "dashboard"
        ).style.display = "block";

        document.getElementById(
          "tokenBox"
        ).innerText = token;

      }

    }

    function logout(){

      localStorage.removeItem("jwtToken");

      location.reload();

    }

    // Auto Login

    showDashboard();

  </script>

</body>
</html>
