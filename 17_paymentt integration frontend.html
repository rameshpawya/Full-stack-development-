<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Integration Frontend</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f1f5f9;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .payment-container{
      width:100%;
      max-width:950px;
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:30px;
    }

    .payment-form,
    .payment-summary{
      background:white;
      padding:25px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    h2{
      margin-bottom:20px;
      color:#1e293b;
    }

    /* Form */

    .form-group{
      margin-bottom:18px;
    }

    .form-group label{
      display:block;
      margin-bottom:8px;
      font-weight:bold;
      color:#374151;
    }

    .form-group input,
    .form-group select{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
      font-size:15px;
    }

    .form-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    /* Payment Methods */

    .payment-methods{
      display:flex;
      gap:15px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .method{
      flex:1;
      min-width:120px;
      padding:15px;
      border:2px solid #ddd;
      border-radius:10px;
      text-align:center;
      cursor:pointer;
      transition:0.3s;
    }

    .method:hover{
      border-color:#1e293b;
    }

    /* Summary */

    .summary-item{
      display:flex;
      justify-content:space-between;
      margin-bottom:15px;
      padding-bottom:10px;
      border-bottom:1px solid #ddd;
    }

    .total{
      display:flex;
      justify-content:space-between;
      font-size:22px;
      font-weight:bold;
      color:#16a34a;
      margin-top:20px;
    }

    /* Button */

    .pay-btn{
      width:100%;
      margin-top:25px;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#1e293b;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .pay-btn:hover{
      background:#334155;
    }

    /* Responsive */

    @media(max-width:768px){

      .payment-container{
        grid-template-columns:1fr;
      }

      .form-row{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>

<body>

  <div class="payment-container">

    <!-- Payment Form -->

    <div class="payment-form">

      <h2>Payment Details</h2>

      <!-- Payment Methods -->

      <div class="payment-methods">

        <div class="method">
          Credit Card
        </div>

        <div class="method">
          UPI
        </div>

        <div class="method">
          PayPal
        </div>

      </div>

      <!-- Form -->

      <form>

        <div class="form-group">
          <label>Card Holder Name</label>
          <input type="text" placeholder="Enter card holder name">
        </div>

        <div class="form-group">
          <label>Card Number</label>
          <input type="text" placeholder="1234 5678 9012 3456">
        </div>

        <div class="form-row">

          <div class="form-group">
            <label>Expiry Date</label>
            <input type="text" placeholder="MM/YY">
          </div>

          <div class="form-group">
            <label>CVV</label>
            <input type="password" placeholder="123">
          </div>

        </div>

        <button class="pay-btn">
          Pay Now
        </button>

      </form>

    </div>

    <!-- Order Summary -->

    <div class="payment-summary">

      <h2>Order Summary</h2>

      <div class="summary-item">
        <span>Running Shoes</span>
        <span>$49</span>
      </div>

      <div class="summary-item">
        <span>Smart Watch</span>
        <span>$99</span>
      </div>

      <div class="summary-item">
        <span>Wireless Headphones</span>
        <span>$120</span>
      </div>

      <div class="total">
        <span>Total</span>
        <span>$268</span>
      </div>

    </div>

  </div>

</body>
</html>
