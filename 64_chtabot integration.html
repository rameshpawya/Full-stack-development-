<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.chat-container{
    width:400px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.chat-header{
    background:#2575fc;
    color:white;
    text-align:center;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

.chat-box{
    height:400px;
    overflow-y:auto;
    padding:15px;
    background:#f5f5f5;
}

.message{
    padding:10px 15px;
    margin:8px 0;
    border-radius:15px;
    max-width:75%;
}

.bot{
    background:#e0e0e0;
}

.user{
    background:#2575fc;
    color:white;
    margin-left:auto;
}

.input-area{
    display:flex;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    border:none;
    padding:15px;
    font-size:16px;
}

button{
    border:none;
    background:#2575fc;
    color:white;
    padding:15px 20px;
    cursor:pointer;
}

button:hover{
    background:#1a5ed9;
}
</style>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        🤖 AI Chatbot
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">
            Hello! How can I help you today?
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput"
               placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

function sendMessage(){

    let input =
        document.getElementById("userInput");

    let message = input.value.trim();

    if(message==="") return;

    let chatBox =
        document.getElementById("chatBox");

    chatBox.innerHTML +=
    `<div class="message user">${message}</div>`;

    let botReply = getBotReply(message);

    setTimeout(()=>{
        chatBox.innerHTML +=
        `<div class="message bot">${botReply}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    },500);

    input.value="";
}

function getBotReply(msg){

    msg = msg.toLowerCase();

    if(msg.includes("hello"))
        return "Hello! Nice to meet you.";

    if(msg.includes("name"))
        return "I am your AI Chatbot.";

    if(msg.includes("bye"))
        return "Goodbye! Have a great day.";

    return "I'm processing your request. Please tell me more.";
}

</script>

</body>
</html>
