<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Listing Page</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f1f5f9;
      padding:30px;
    }

    /* Header */

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
      flex-wrap:wrap;
      gap:15px;
    }

    .header h1{
      color:#1e293b;
    }

    .search-box input{
      padding:12px;
      width:250px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
    }

    /* Product Grid */

    .product-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
    }

    /* Product Card */

    .product-card{
      background:white;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .product-card:hover{
      transform:translateY(-5px);
    }

    .product-card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .product-content{
      padding:20px;
    }

    .product-content h3{
      margin-bottom:10px;
      color:#1e293b;
    }

    .product-content p{
      color:#555;
      margin-bottom:15px;
      font-size:14px;
    }

    .price{
      font-size:22px;
      font-weight:bold;
      color:#16a34a;
      margin-bottom:15px;
    }

    .btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#1e293b;
      color:white;
      font-size:15px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#334155;
    }

    /* Responsive */

    @media(max-width:768px){

      body{
        padding:20px;
      }

      .header{
        flex-direction:column;
        align-items:flex-start;
      }

      .search-box input{
        width:100%;
      }

    }

  </style>
</head>

<body>

  <!-- Header -->

  <div class="header">

    <h1>Product Listing</h1>

    <div class="search-box">
      <input type="text" placeholder="Search products...">
    </div>

  </div>

  <!-- Product Grid -->

  <div class="product-grid">

    <!-- Product 1 -->

    <div class="product-card">

      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600" alt="Shoes">

      <div class="product-content">

        <h3>Running Shoes</h3>

        <p>Comfortable and stylish running shoes for daily use.</p>

        <div class="price">$49</div>

        <button class="btn">
          Add to Cart
        </button>

      </div>

    </div>

    <!-- Product 2 -->

    <div class="product-card">

      <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600" alt="Watch">

      <div class="product-content">

        <h3>Smart Watch</h3>

        <p>Modern smartwatch with health tracking features.</p>

        <div class="price">$89</div>

        <button class="btn">
          Add to Cart
        </button>

      </div>

    </div>

    <!-- Product 3 -->

    <div class="product-card">

      <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=600" alt="Phone">

      <div class="product-content">

        <h3>Mobile Phone</h3>

        <p>Latest smartphone with powerful performance.</p>

        <div class="price">$599</div>

        <button class="btn">
          Add to Cart
        </button>

      </div>

    </div>

    <!-- Product 4 -->

    <div class="product-card">

      <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600" alt="Headphones">

      <div class="product-content">

        <h3>Wireless Headphones</h3>

        <p>High quality sound with noise cancellation.</p>

        <div class="price">$120</div>

        <button class="btn">
          Add to Cart
        </button>

      </div>

    </div>

  </div>

</body>
</html>
