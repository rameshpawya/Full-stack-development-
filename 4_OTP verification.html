<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>OTP Verification</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#2563eb,#7c3aed);
      padding:20px;
    }

    .container{
      width:100%;
      max-width:400px;
      background:white;
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      text-align:center;
    }

    h2{
      margin-bottom:15px;
      color:#222;
    }

    p{
      color:#666;
      margin-bottom:25px;
      line-height:1.5;
    }

    .otp-box{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-bottom:25px;
    }

    .otp-box input{
      width:55px;
      height:55px;
      text-align:center;
      font-size:22px;
      border:1px solid #ccc;
      border-radius:10px;
      outline:none;
      transition:0.3s;
    }

    .otp-box input:focus{
      border-color:#2563eb;
      box-shadow:0 0 5px rgba(37,99,235,0.4);
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#1d4ed8;
    }

    .message{
      margin-top:20px;
      font-size:15px;
      font-weight:bold;
    }

    .success{
      color:green;
    }

    .error{
      color:red;
    }

    .resend{
      margin-top:20px;
    }

    .resend a{
      color:#2563eb;
      text-decoration:none;
      font-weight:bold;
      cursor:pointer;
    }

  </style>

</head>

<body>

  <div class="container">

    <h2>OTP Verification</h2>

    <p>
      Enter the 4-digit OTP sent to your mobile/email.
    </p>

    <div class="otp-box">

      <input type="text" maxlength="1" class="otp">
      <input type="text" maxlength="1" class="otp">
      <input type="text" maxlength="1" class="otp">
      <input type="text" maxlength="1" class="otp">

    </div>

    <button class="btn" onclick="verifyOTP()">
      Verify OTP
    </button>

    <div class="message" id="message"></div>

    <div class="resend">
      <a onclick="resendOTP()">Resend OTP</a>
    </div>

  </div>

  <script>

    // Auto move to next box
    const inputs = document.querySelectorAll(".otp");

    inputs.forEach((input, index) => {

      input.addEventListener("keyup", (e) => {

        if(input.value.length === 1 && index < inputs.length - 1){
          inputs[index + 1].focus();
        }

      });

    });

    // Verify OTP
    function verifyOTP(){

      let otp = "";

      inputs.forEach(input => {
        otp += input.value;
      });

      let message = document.getElementById("message");

      // Demo OTP = 1234
      if(otp === "1234"){

        message.innerHTML = "OTP Verified Successfully!";
        message.className = "message success";

      }
      else{

        message.innerHTML = "Invalid OTP!";
        message.className = "message error";

      }

    }

    // Resend OTP
    function resendOTP(){

      alert("New OTP Sent Successfully!");

    }

  </script>

</body>
</html>
