<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Angular Dashboard UI</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f6f9;
    }

    .container{
      display:flex;
      min-height:100vh;
    }

    /* Sidebar */

    .sidebar{
      width:250px;
      background:#1e293b;
      color:white;
      padding:20px;
    }

    .sidebar h2{
      text-align:center;
      margin-bottom:30px;
    }

    .sidebar ul{
      list-style:none;
    }

    .sidebar ul li{
      padding:15px;
      margin:10px 0;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    .sidebar ul li:hover{
      background:#334155;
    }

    /* Main Content */

    .main{
      flex:1;
      padding:20px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:white;
      padding:15px 20px;
      border-radius:10px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
      margin-bottom:20px;
    }

    .search-box input{
      padding:10px;
      width:250px;
      border:1px solid #ccc;
      border-radius:5px;
    }

    /* Cards */

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:30px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    .card h3{
      margin-bottom:10px;
      color:#555;
    }

    .card p{
      font-size:28px;
      font-weight:bold;
      color:#2563eb;
    }

    /* Table */

    .table-section{
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:15px;
    }

    table th,
    table td{
      padding:12px;
      text-align:left;
      border-bottom:1px solid #ddd;
    }

    table th{
      background:#2563eb;
      color:white;
    }

    @media(max-width:768px){

      .sidebar{
        width:80px;
      }

      .sidebar h2{
        font-size:16px;
      }

      .sidebar ul li{
        font-size:12px;
        padding:10px;
      }

      .search-box input{
        width:150px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Sidebar -->

    <div class="sidebar">
      <h2>Dashboard</h2>

      <ul>
        <li>Home</li>
        <li>Analytics</li>
        <li>Users</li>
        <li>Products</li>
        <li>Settings</li>
        <li>Logout</li>
      </ul>
    </div>

    <!-- Main Content -->

    <div class="main">

      <!-- Topbar -->

      <div class="topbar">
        <h1>Admin Dashboard</h1>

        <div class="search-box">
          <input type="text" placeholder="Search...">
        </div>
      </div>

      <!-- Cards -->

      <div class="cards">

        <div class="card">
          <h3>Total Users</h3>
          <p>1,250</p>
        </div>

        <div class="card">
          <h3>Total Sales</h3>
          <p>$8,540</p>
        </div>

        <div class="card">
          <h3>Orders</h3>
          <p>320</p>
        </div>

        <div class="card">
          <h3>Revenue</h3>
          <p>$12,400</p>
        </div>

      </div>

      <!-- Table -->

      <div class="table-section">

        <h2>Recent Orders</h2>

        <table>
          <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Status</th>
            <th>Amount</th>
          </tr>

          <tr>
            <td>#1001</td>
            <td>John</td>
            <td>Completed</td>
            <td>$120</td>
          </tr>

          <tr>
            <td>#1002</td>
            <td>David</td>
            <td>Pending</td>
            <td>$90</td>
          </tr>

          <tr>
            <td>#1003</td>
            <td>Sarah</td>
            <td>Shipped</td>
            <td>$150</td>
          </tr>

        </table>

      </div>

    </div>

  </div>

</body>
</html>
