<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CSS Animation</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(to right,#0f172a,#1e3a8a);
      overflow:hidden;
    }

    .container{
      text-align:center;
      color:white;
    }

    h1{
      font-size:50px;
      margin-bottom:20px;

      animation:fadeIn 2s ease-in-out;
    }

    p{
      font-size:20px;
      margin-bottom:30px;

      animation:slideUp 2s ease-in-out;
    }

    .btn{
      padding:14px 30px;
      border:none;
      border-radius:10px;
      background:#38bdf8;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;

      animation:bounce 2s infinite;
    }

    .btn:hover{
      background:#0ea5e9;
      transform:scale(1.1);
    }

    /* Floating Circle */

    .circle{
      position:absolute;
      width:120px;
      height:120px;
      border-radius:50%;
      background:rgba(255,255,255,0.2);

      animation:float 5s infinite ease-in-out;
    }

    .circle1{
      top:10%;
      left:10%;
    }

    .circle2{
      bottom:15%;
      right:15%;
      width:180px;
      height:180px;
      animation-duration:7s;
    }

    /* Keyframes */

    @keyframes fadeIn{

      from{
        opacity:0;
      }

      to{
        opacity:1;
      }

    }

    @keyframes slideUp{

      from{
        transform:translateY(50px);
        opacity:0;
      }

      to{
        transform:translateY(0);
        opacity:1;
      }

    }

    @keyframes bounce{

      0%{
        transform:translateY(0);
      }

      50%{
        transform:translateY(-10px);
      }

      100%{
        transform:translateY(0);
      }

    }

    @keyframes float{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-30px);
      }

      100%{
        transform:translateY(0px);
      }

    }

    /* Mobile Responsive */

    @media(max-width:600px){

      h1{
        font-size:35px;
      }

      p{
        font-size:16px;
      }

      .btn{
        width:100%;
      }

    }

  </style>
</head>

<body>

  <!-- Background Animation -->

  <div class="circle circle1"></div>
  <div class="circle circle2"></div>

  <!-- Main Content -->

  <div class="container">

    <h1>CSS Animation</h1>

    <p>
      Beautiful animations using HTML and CSS.
    </p>

    <button class="btn">
      Explore
    </button>

  </div>

</body>
</html>
