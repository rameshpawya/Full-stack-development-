<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frontend Validation Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    width:420px;
    padding:35px;
    border-radius:20px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.15);
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    color:white;
}

.container h2{
    text-align:center;
    margin-bottom:25px;
    font-size:28px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:500;
}

.form-group input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:15px;
    transition:0.3s;
}

.form-group input:focus{
    transform:scale(1.02);
}

.error{
    color:#ffb3b3;
    font-size:13px;
    margin-top:5px;
}

.success{
    color:#9cff9c;
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#00d4ff;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00b8e6;
    transform:translateY(-2px);
}

.valid{
    border:2px solid #4CAF50;
}

.invalid{
    border:2px solid #ff4d4d;
}
</style>
</head>

<body>

<div class="container">
    <h2>Register Account</h2>

    <form id="myForm">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name">
            <div class="error" id="nameError"></div>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email">
            <div class="error" id="emailError"></div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password">
            <div class="error" id="passwordError"></div>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword">
            <div class="error" id="confirmError"></div>
        </div>

        <button type="submit">Create Account</button>

        <div class="success" id="successMsg"></div>

    </form>
</div>

<script>
const form = document.getElementById("myForm");

form.addEventListener("submit", function(e){
    e.preventDefault();

    let isValid = true;

    const name = document.getElementById("name");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");

    document.getElementById("successMsg").innerHTML = "";

    document.querySelectorAll(".error").forEach(el=>{
        el.innerHTML="";
    });

    function setError(input,id,message){
        document.getElementById(id).innerHTML=message;
        input.classList.add("invalid");
        input.classList.remove("valid");
        isValid=false;
    }

    function setSuccess(input){
        input.classList.add("valid");
        input.classList.remove("invalid");
    }

    if(name.value.trim().length < 3){
        setError(name,"nameError","Name must be at least 3 characters");
    }else{
        setSuccess(name);
    }

    const emailPattern =
    /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(!emailPattern.test(email.value)){
        setError(email,"emailError","Enter a valid email");
    }else{
        setSuccess(email);
    }

    if(password.value.length < 6){
        setError(password,"passwordError",
        "Password must be at least 6 characters");
    }else{
        setSuccess(password);
    }

    if(confirmPassword.value !== password.value){
        setError(confirmPassword,
        "confirmError",
        "Passwords do not match");
    }else{
        setSuccess(confirmPassword);
    }

    if(isValid){
        document.getElementById("successMsg")
        .innerHTML="✓ Registration Successful!";
        form.reset();

        document.querySelectorAll("input").forEach(input=>{
            input.classList.remove("valid");
        });
    }
});
</script>

</body>
</html>
