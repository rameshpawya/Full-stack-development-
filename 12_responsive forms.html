<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Form</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f1f5f9;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .form-container{
      width:100%;
      max-width:700px;
      background:white;
      padding:35px;
      border-radius:15px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
    }

    .form-container h1{
      text-align:center;
      margin-bottom:30px;
      color:#1e293b;
    }

    /* Form Grid */

    .form-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:20px;
    }

    .input-group{
      display:flex;
      flex-direction:column;
    }

    .input-group label{
      margin-bottom:8px;
      font-weight:bold;
      color:#374151;
    }

    .input-group input,
    .input-group textarea,
    .input-group select{
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
      font-size:15px;
    }

    .input-group textarea{
      resize:none;
      height:120px;
    }

    .full-width{
      grid-column:1 / 3;
    }

    /* Button */

    .submit-btn{
      width:100%;
      margin-top:25px;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#1e293b;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .submit-btn:hover{
      background:#334155;
    }

    /* Responsive */

    @media(max-width:768px){

      .form-grid{
        grid-template-columns:1fr;
      }

      .full-width{
        grid-column:1;
      }

      .form-container{
        padding:25px;
      }

    }

  </style>
</head>

<body>

  <div class="form-container">

    <h1>Responsive Contact Form</h1>

    <form>

      <div class="form-grid">

        <!-- First Name -->

        <div class="input-group">
          <label>First Name</label>
          <input type="text" placeholder="Enter first name">
        </div>

        <!-- Last Name -->

        <div class="input-group">
          <label>Last Name</label>
          <input type="text" placeholder="Enter last name">
        </div>

        <!-- Email -->

        <div class="input-group">
          <label>Email</label>
          <input type="email" placeholder="Enter email">
        </div>

        <!-- Phone -->

        <div class="input-group">
          <label>Phone</label>
          <input type="text" placeholder="Enter phone number">
        </div>

        <!-- Select -->

        <div class="input-group full-width">
          <label>Subject</label>

          <select>
            <option>Select Subject</option>
            <option>Frontend Development</option>
            <option>Backend Development</option>
            <option>UI/UX Design</option>
          </select>
        </div>

        <!-- Message -->

        <div class="input-group full-width">
          <label>Message</label>

          <textarea placeholder="Write your message"></textarea>
        </div>

      </div>

      <!-- Button -->

      <button class="submit-btn">
        Submit Form
      </button>

    </form>

  </div>

</body>
</html>
