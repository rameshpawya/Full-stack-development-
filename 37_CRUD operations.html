<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>CRUD Operations</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f3f4f6;
      padding:40px;
    }

    .container{
      max-width:1000px;
      margin:auto;
    }

    h1{
      text-align:center;
      margin-bottom:30px;
      color:#111827;
    }

    .card{
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      margin-bottom:25px;
    }

    h2{
      margin-bottom:15px;
      color:#2563eb;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
    }

    button{
      padding:12px 18px;
      border:none;
      border-radius:8px;
      background:#2563eb;
      color:white;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#1d4ed8;
    }

    .edit-btn{
      background:orange;
      margin-right:5px;
    }

    .edit-btn:hover{
      background:darkorange;
    }

    .delete-btn{
      background:red;
    }

    .delete-btn:hover{
      background:darkred;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
    }

    table th,
    table td{
      border:1px solid #ddd;
      padding:12px;
      text-align:center;
    }

    table th{
      background:#2563eb;
      color:white;
    }

    @media(max-width:768px){

      body{
        padding:15px;
      }

      table{
        font-size:14px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <h1>CRUD Operation System</h1>

    <!-- Form Section -->

    <div class="card">

      <h2>Add / Update Product</h2>

      <input
        type="text"
        id="productName"
        placeholder="Enter Product Name"
      >

      <input
        type="number"
        id="productPrice"
        placeholder="Enter Product Price"
      >

      <button onclick="saveProduct()">
        Save Product
      </button>

    </div>

    <!-- Table Section -->

    <div class="card">

      <h2>Product List</h2>

      <table>

        <thead>

          <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Actions</th>

          </tr>

        </thead>

        <tbody id="productTable">

        </tbody>

      </table>

    </div>

  </div>

  <script>

    let products = [

      {
        id:1,
        name:"Laptop",
        price:50000
      },

      {
        id:2,
        name:"Mobile",
        price:20000
      }

    ];

    let editIndex = -1;

    function displayProducts(){

      const table =
        document.getElementById("productTable");

      table.innerHTML = "";

      products.forEach((product,index)=>{

        table.innerHTML += `

          <tr>

            <td>${product.id}</td>

            <td>${product.name}</td>

            <td>₹${product.price}</td>

            <td>

              <button
                class="edit-btn"
                onclick="editProduct(${index})">

                Edit

              </button>

              <button
                class="delete-btn"
                onclick="deleteProduct(${index})">

                Delete

              </button>

            </td>

          </tr>

        `;

      });

    }

    function saveProduct(){

      const name =
        document.getElementById("productName").value;

      const price =
        document.getElementById("productPrice").value;

      if(name === "" || price === ""){

        alert("Please fill all fields");

        return;

      }

      if(editIndex === -1){

        // CREATE

        const newProduct = {

          id: products.length + 1,

          name:name,

          price:price

        };

        products.push(newProduct);

      }

      else{

        // UPDATE

        products[editIndex].name = name;

        products[editIndex].price = price;

        editIndex = -1;

      }

      displayProducts();

      clearForm();

    }

    function editProduct(index){

      document.getElementById(
        "productName"
      ).value = products[index].name;

      document.getElementById(
        "productPrice"
      ).value = products[index].price;

      editIndex = index;

    }

    function deleteProduct(index){

      // DELETE

      products.splice(index,1);

      displayProducts();

    }

    function clearForm(){

      document.getElementById(
        "productName"
      ).value = "";

      document.getElementById(
        "productPrice"
      ).value = "";

    }

    // READ

    displayProducts();

  </script>

</body>
</html>
