<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile App Splash Screen</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e0e7ff;
}

.phone{
    width:360px;
    height:720px;
    border-radius:40px;
    overflow:hidden;
    position:relative;
    background:linear-gradient(135deg,#4f46e5,#7c3aed,#9333ea);
    box-shadow:0 25px 50px rgba(0,0,0,0.2);
}

/* Decorative circles */
.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
}

.circle1{
    width:250px;
    height:250px;
    top:-80px;
    right:-60px;
}

.circle2{
    width:180px;
    height:180px;
    bottom:80px;
    left:-70px;
}

.circle3{
    width:120px;
    height:120px;
    bottom:-30px;
    right:40px;
}

.content{
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
    position:relative;
    z-index:2;
}

.logo{
    width:130px;
    height:130px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:60px;
    margin-bottom:30px;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-12px);
    }
}

.app-name{
    font-size:42px;
    font-weight:700;
    letter-spacing:2px;
    margin-bottom:10px;
}

.tagline{
    font-size:16px;
    opacity:0.9;
    max-width:250px;
    line-height:1.7;
}

.loading{
    position:absolute;
    bottom:80px;
    width:100%;
    text-align:center;
}

.loader{
    width:60px;
    height:6px;
    margin:0 auto 15px;
    background:rgba(255,255,255,0.2);
    border-radius:20px;
    overflow:hidden;
}

.loader span{
    display:block;
    width:40%;
    height:100%;
    background:white;
    border-radius:20px;
    animation:loading 1.5s infinite;
}

@keyframes loading{
    0%{
        transform:translateX(-100%);
    }
    100%{
        transform:translateX(250%);
    }
}

.version{
    font-size:13px;
    opacity:0.8;
}
</style>
</head>
<body>

<div class="phone">

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>

    <div class="content">

        <div class="logo">
            🚀
        </div>

        <h1 class="app-name">NovaApp</h1>

        <p class="tagline">
            Smart Solutions for a Connected Future
        </p>

    </div>

    <div class="loading">

        <div class="loader">
            <span></span>
        </div>

        <div class="version">
            Version 1.0.0
        </div>

    </div>

</div>

</body>
</html>
