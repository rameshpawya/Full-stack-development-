<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Management</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f7fc;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .profile-container{
      width:100%;
      max-width:900px;
      background:white;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
    }

    /* Header */

    .profile-header{
      background:#1e293b;
      color:white;
      padding:40px 20px;
      text-align:center;
    }

    .profile-header img{
      width:120px;
      height:120px;
      border-radius:50%;
      border:5px solid white;
      object-fit:cover;
      margin-bottom:15px;
    }

    .profile-header h2{
      margin-bottom:5px;
    }

    .profile-header p{
      opacity:0.8;
    }

    /* Content */

    .profile-content{
      padding:30px;
    }

    .section-title{
      margin-bottom:20px;
      color:#1e293b;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:20px;
    }

    .input-box{
      display:flex;
      flex-direction:column;
    }

    .input-box label{
      margin-bottom:8px;
      font-weight:bold;
      color:#444;
    }

    .input-box input,
    .input-box textarea{
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
      font-size:15px;
    }

    .input-box textarea{
      resize:none;
      height:100px;
    }

    .full-width{
      grid-column:1 / 3;
    }

    /* Button */

    .btn{
      margin-top:25px;
      padding:14px 20px;
      background:#1e293b;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }

    .btn:hover{
      background:#334155;
    }

    /* Responsive */

    @media(max-width:768px){

      .form-grid{
        grid-template-columns:1fr;
      }

      .full-width{
        grid-column:1;
      }

      .profile-header{
        padding:30px 15px;
      }

    }

  </style>
</head>

<body>

  <div class="profile-container">

    <!-- Header -->

    <div class="profile-header">

      <img src="https://i.pravatar.cc/150?img=12" alt="Profile">

      <h2>John Doe</h2>

      <p>Frontend Developer</p>

    </div>

    <!-- Content -->

    <div class="profile-content">

      <h2 class="section-title">Profile Information</h2>

      <form>

        <div class="form-grid">

          <div class="input-box">
            <label>First Name</label>
            <input type="text" placeholder="Enter first name">
          </div>

          <div class="input-box">
            <label>Last Name</label>
            <input type="text" placeholder="Enter last name">
          </div>

          <div class="input-box">
            <label>Email</label>
            <input type="email" placeholder="Enter email">
          </div>

          <div class="input-box">
            <label>Phone</label>
            <input type="text" placeholder="Enter phone number">
          </div>

          <div class="input-box full-width">
            <label>Address</label>
            <input type="text" placeholder="Enter address">
          </div>

          <div class="input-box full-width">
            <label>Bio</label>
            <textarea placeholder="Write something about yourself"></textarea>
          </div>

        </div>

        <button class="btn">Update Profile</button>

      </form>

    </div>

  </div>

</body>
</html>
