<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    width:420px;
    background:white;
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    color:#667eea;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:2px solid #667eea;
    border-radius:10px;
    outline:none;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#667eea;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

#qrcode{
    margin-top:25px;
    display:flex;
    justify-content:center;
}
</style>
</head>
<body>

<div class="container">

    <h1>📱 QR Code Generator</h1>

    <input type="text"
           id="qrText"
           placeholder="Enter text or URL">

    <button onclick="generateQR()">
        Generate QR Code
    </button>

    <div id="qrcode"></div>

</div>

<script>

function generateQR(){

    let qrText =
    document.getElementById("qrText").value;

    let qrContainer =
    document.getElementById("qrcode");

    qrContainer.innerHTML = "";

    if(qrText.trim() === ""){
        alert("Please enter text or URL");
        return;
    }

    new QRCode(qrContainer,{
        text: qrText,
        width: 220,
        height: 220,
        colorDark:"#000000",
        colorLight:"#ffffff",
        correctLevel:QRCode.CorrectLevel.H
    });
}

</script>

</body>
</html>
