<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Forgot Password</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#2563eb,#7c3aed);
      padding:20px;
    }

    .container{
      width:100%;
      max-width:400px;
      background:white;
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
      margin-bottom:15px;
      color:#222;
    }

    p{
      text-align:center;
      color:#666;
      margin-bottom:25px;
      line-height:1.5;
    }

    .input-box{
      margin-bottom:20px;
    }

    .input-box input{
      width:100%;
      padding:14px;
      border:1px solid #ccc;
      border-radius:10px;
      outline:none;
      font-size:15px;
      transition:0.3s;
    }

    .input-box input:focus{
      border-color:#2563eb;
      box-shadow:0 0 5px rgba(37,99,235,0.4);
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#1d4ed8;
    }

    .message{
      margin-top:20px;
      text-align:center;
      font-size:15px;
      color:green;
      display:none;
    }

    .back{
      margin-top:20px;
      text-align:center;
    }

    .back a{
      text-decoration:none;
      color:#2563eb;
      font-weight:bold;
    }

  </style>

</head>

<body>

  <div class="container">

    <h2>Forgot Password</h2>

    <p>
      Enter your email address and we will send
      a password reset link.
    </p>

    <div class="input-box">
      <input type="email" id="email" placeholder="Enter your email">
    </div>

    <button class="btn" onclick="resetPassword()">
      Send Reset Link
    </button>

    <div class="message" id="message">
      Reset link sent successfully!
    </div>

    <div class="back">
      <a href="#">Back to Login</a>
    </div>

  </div>

  <script>

    function resetPassword(){

      let email = document.getElementById("email").value;
      let message = document.getElementById("message");

      if(email === ""){

        alert("Please enter your email!");

      }
      else{

        message.style.display = "block";

      }

    }

  </script>

</body>
</html>
