<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Mode Feature</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
      transition:0.3s;
    }

    body{
      background:#f1f5f9;
      color:#111827;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    /* Dark Mode */

    body.dark{
      background:#0f172a;
      color:white;
    }

    /* Card */

    .container{
      width:100%;
      max-width:500px;
      background:white;
      padding:30px;
      border-radius:15px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
      text-align:center;
    }

    body.dark .container{
      background:#1e293b;
      color:white;
    }

    h1{
      margin-bottom:15px;
    }

    p{
      margin-bottom:25px;
      color:#555;
    }

    body.dark p{
      color:#cbd5e1;
    }

    /* Toggle Button */

    .toggle-btn{
      padding:14px 22px;
      border:none;
      border-radius:10px;
      background:#111827;
      color:white;
      cursor:pointer;
      font-size:16px;
    }

    body.dark .toggle-btn{
      background:#f8fafc;
      color:#111827;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Dark Mode Feature</h1>

    <p>
      Click the button below to switch between
      light mode and dark mode.
    </p>

    <button class="toggle-btn" id="darkModeBtn">
      Enable Dark Mode
    </button>

  </div>

  <script>

    const darkBtn = document.getElementById("darkModeBtn");

    darkBtn.addEventListener("click", () => {

      document.body.classList.toggle("dark");

      if(document.body.classList.contains("dark")){
        darkBtn.innerText = "Disable Dark Mode";
      }
      else{
        darkBtn.innerText = "Enable Dark Mode";
      }

    });

  </script>

</body>
</html>
