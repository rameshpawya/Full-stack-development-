<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Integration Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:90%;
    max-width:900px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    text-align:center;
}

h1{
    color:#333;
    margin-bottom:20px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#667eea;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

#users{
    margin-top:25px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#f7f9fc;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h3{
    color:#667eea;
    margin-bottom:10px;
}

.card p{
    color:#555;
}
</style>
</head>
<body>

<div class="container">
    <h1>🌐 API Integration Project</h1>

    <button onclick="fetchUsers()">
        Load Users
    </button>

    <div id="users"></div>
</div>

<script>

async function fetchUsers(){

    const response =
    await fetch('https://jsonplaceholder.typicode.com/users');

    const data = await response.json();

    let output = "";

    data.forEach(user => {

        output += `
        <div class="card">
            <h3>${user.name}</h3>
            <p><b>Email:</b> ${user.email}</p>
            <p><b>Phone:</b> ${user.phone}</p>
            <p><b>City:</b> ${user.address.city}</p>
        </div>
        `;
    });

    document.getElementById("users").innerHTML = output;
}

</script>

</body>
</html>
