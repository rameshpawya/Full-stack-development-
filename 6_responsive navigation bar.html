<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Responsive Navbar</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
    }

    /* Navbar */

    .navbar{
      width:100%;
      background:#111827;
      padding:18px 8%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:relative;
    }

    /* Logo */

    .logo{
      color:white;
      font-size:28px;
      font-weight:bold;
    }

    /* Navigation Links */

    .nav-links{
      display:flex;
      list-style:none;
      gap:30px;
    }

    .nav-links li a{
      color:white;
      text-decoration:none;
      font-size:16px;
      transition:0.3s;
    }

    .nav-links li a:hover{
      color:#60a5fa;
    }

    /* Hamburger Menu */

    .menu-icon{
      display:none;
      flex-direction:column;
      cursor:pointer;
      gap:5px;
    }

    .menu-icon span{
      width:28px;
      height:3px;
      background:white;
      border-radius:5px;
    }

    /* Responsive Design */

    @media(max-width:768px){

      .menu-icon{
        display:flex;
      }

      .nav-links{
        position:absolute;
        top:75px;
        left:0;
        width:100%;
        background:#111827;
        flex-direction:column;
        align-items:center;
        padding:20px 0;
        display:none;
      }

      .nav-links.active{
        display:flex;
      }

      .nav-links li{
        margin:12px 0;
      }

    }

    /* Demo Content */

    .hero{
      height:90vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    .hero h1{
      font-size:50px;
      color:#111827;
    }

  </style>

</head>

<body>

  <!-- Navbar -->

  <nav class="navbar">

    <div class="logo">MyBrand</div>

    <ul class="nav-links" id="navMenu">

      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Contact</a></li>

    </ul>

    <!-- Hamburger Icon -->

    <div class="menu-icon" onclick="toggleMenu()">

      <span></span>
      <span></span>
      <span></span>

    </div>

  </nav>

  <!-- Hero Section -->

  <section class="hero">

    <h1>Responsive Navigation Bar</h1>

  </section>

  <script>

    function toggleMenu(){

      let navMenu = document.getElementById("navMenu");

      navMenu.classList.toggle("active");

    }

  </script>

</body>
</html>
